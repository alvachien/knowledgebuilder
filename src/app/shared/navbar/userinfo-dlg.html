<h2 mat-dialog-title>Invitation Code</h2>
<mat-dialog-content class="control-full-width">
  <mat-form-field class="control-full-width">
    <mat-label>Code</mat-label>
    <input matInput type="text" [(ngModel)]="usercode">
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button (click)="onNoClick()">Cancel</button>
  <button mat-button (click)="onYesClick()" cdkFocusInitial>OK</button>
</mat-dialog-actions>
