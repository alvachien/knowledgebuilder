<main focusOnNavigation aria-label="Knowledge Exercise" class="knowledge-exercises-detail-v2-page">
    <div class="knowledge-exercises-detail-v2-page-content">
        <mat-toolbar class="container">
            <mat-toolbar-row>
                <span>
                    <h5>Knowledge Bank - Exericse Detail, Version 2</h5>
                </span>
                <span class="toolbar-spacer"></span>
                <button mat-button [useExistingCss]="true" printSectionId="print-section" ngxPrint>Print</button>
            </mat-toolbar-row>
        </mat-toolbar>
        <div class="mat-elevation-z8 print-container">
            <div id="print-section">
                <app-markdown-content [markdown]="markdownStr" [enableMath]="includeLatex || false" [imageBaseUrl]="imageBaseUrl"></app-markdown-content>
                <div class="page-break"></div>
                <app-markdown-content [markdown]="markdownAdditionStr" [enableMath]="includeLatex || false" [imageBaseUrl]="imageBaseUrl"></app-markdown-content>
            </div>
        </div>
    </div>
</main>
