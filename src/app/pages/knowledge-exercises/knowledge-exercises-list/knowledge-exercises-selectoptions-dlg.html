<div *transloco="let t">
  <h2 mat-dialog-title>{{ t('knowledgeExercises.optionsOfSelection') }}</h2>
  <mat-dialog-content class="control-full-width">
    <mat-form-field class="control-full-width">
      <mat-label>{{ t('knowledgeExercises.mode') }}</mat-label>
      <mat-select matNativeControl class="control-full-width" [(value)]="selectedSelectMode">
        @for (lvl of allSelectModes.keys(); track $index) {
          <mat-option [value]="lvl">{{allSelectModes.get(lvl)}}</mat-option>
        }
      </mat-select>
    </mat-form-field>
    <mat-form-field class="control-full-width">
      <mat-label>{{ t('knowledgeExercises.idsSplitter') }}</mat-label>
      <textarea matInput rows="5" [(ngModel)]="importIDs" placeholder="IDs" [disabled]="!isSelectByID"></textarea>
    </mat-form-field>
    <mat-form-field class="control-full-width">
      <mat-label>{{ t('knowledgeExercises.countOfSelection') }}</mat-label>
      <input matInput type="number" [(ngModel)]="countOfItems" placeholder="Count" [disabled]="!isSelectByFreeSelection" />
    </mat-form-field>
    <mat-form-field class="control-full-width">
      <mat-label>{{ t('knowledgeExercises.filterOnTags') }}</mat-label>
      <input matInput type="text" [(ngModel)]="filterOnTag" placeholder="Filter" [disabled]="!isSelectByFreeSelection" />
    </mat-form-field>
  </mat-dialog-content>
  <mat-dialog-actions>
    <button mat-button (click)="onNoClick()" cdkFocusInitial>{{ t('no') }}</button>
    <button mat-button (click)="onYesClick()" [disabled]="isFormInvalid">{{ t('ok') }}</button>
  </mat-dialog-actions>
</div>
