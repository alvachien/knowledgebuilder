<div *transloco="let t">
  <h2 mat-dialog-title>{{ t('knowledgeExercises.selectByID') }}</h2>
  <mat-dialog-content class="control-full-width">
    <mat-form-field class="control-full-width">
      <mat-label>{{ t('knowledgeExercises.idsSplitter') }}</mat-label>
      <textarea matInput rows="5" [(ngModel)]="importIDs" placeholder="IDs"></textarea>
    </mat-form-field>
  </mat-dialog-content>
  <mat-dialog-actions>
    <button mat-button (click)="onNoClick()">{{ t('no') }}</button>
    <button mat-button (click)="onYesClick()" [disabled]="isFormInvalid">{{ t('ok') }}</button>
  </mat-dialog-actions>
</div>
