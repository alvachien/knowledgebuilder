<div *transloco="let t">
  <h2 mat-dialog-title>{{ t('translateExercises.extraInfoTitle') }}</h2>
  <mat-dialog-content class="mat-typography">
    <app-markdown-content [markdown]="data.content" [enableMath]="false"></app-markdown-content>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button mat-button (click)="onCloseClick()">{{ t('translateExercises.close') }}</button>
  </mat-dialog-actions>
</div>
