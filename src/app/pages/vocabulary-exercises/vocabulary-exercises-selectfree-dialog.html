<div *transloco="let t">
  <h2 mat-dialog-title>{{ t('vocabularyExercises.selectFree') }}</h2>
  <mat-dialog-content class="control-full-width">
    <mat-form-field class="control-full-width">
      <mat-label>{{ t('vocabularyExercises.countOfSelection') }}</mat-label>
      <input matInput type="number" [(ngModel)]="countOfItems" min="1" />
    </mat-form-field>
  </mat-dialog-content>
  <mat-dialog-actions>
    <button mat-button (click)="onNoClick()">{{ t('no') }}</button>
    <button mat-button (click)="onYesClick()" [disabled]="isFormInvalid">{{ t('ok') }}</button>
  </mat-dialog-actions>
</div>
